<svg viewBox="0 0 206 52" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dock">
  <!-- # grid mark: 5-col × 5-row, square=8, gap=3 (spacing=11) -->
  <!-- Row 0: cols 1, 3 (vertical bar tops) -->
  <rect x="11" y="0"  width="8" height="8" fill="#00D8D8"/>
  <rect x="33" y="0"  width="8" height="8" fill="#00D8D8"/>
  <!-- Row 1: full horizontal bar (cols 0–4) -->
  <rect x="0"  y="11" width="8" height="8" fill="#00D8D8"/>
  <rect x="11" y="11" width="8" height="8" fill="#00D8D8"/>
  <rect x="22" y="11" width="8" height="8" fill="#00D8D8"/>
  <rect x="33" y="11" width="8" height="8" fill="#00D8D8"/>
  <rect x="44" y="11" width="8" height="8" fill="#00D8D8"/>
  <!-- Row 2: cols 1, 3 (vertical bar middle) -->
  <rect x="11" y="22" width="8" height="8" fill="#00D8D8"/>
  <rect x="33" y="22" width="8" height="8" fill="#00D8D8"/>
  <!-- Row 3: full horizontal bar (cols 0–4) -->
  <rect x="0"  y="33" width="8" height="8" fill="#00D8D8"/>
  <rect x="11" y="33" width="8" height="8" fill="#00D8D8"/>
  <rect x="22" y="33" width="8" height="8" fill="#00D8D8"/>
  <rect x="33" y="33" width="8" height="8" fill="#00D8D8"/>
  <rect x="44" y="33" width="8" height="8" fill="#00D8D8"/>
  <!-- Row 4: cols 1, 3 (vertical bar bottoms) -->
  <rect x="11" y="44" width="8" height="8" fill="#00D8D8"/>
  <rect x="33" y="44" width="8" height="8" fill="#00D8D8"/>
  <!-- "Dock" wordmark -->
  <text
    x="66" y="41"
    font-family="'Bricolage Grotesque', 'Instrument Sans', system-ui, sans-serif"
    font-weight="700"
    font-size="44"
    fill="#00D8D8"
    letter-spacing="-1"
  >Dock</text>
</svg>
